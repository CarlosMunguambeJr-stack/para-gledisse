<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #fdfbfb, #ebedee);
        color: #333;
        overflow-x: hidden;
        width: 100vw;
        height: 100vh;
    }

    /* Fundo Principal */
    .bg {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('foto.jpg') center/cover no-repeat;
        filter: blur(6px) brightness(0.7);
        z-index: -2;
    }

    /* Hello Kitty flutuando ao fundo */
    .kitty {
        position: fixed;
        bottom: -50px;
        z-index: -1;
        pointer-events: none;
        opacity: 0.5;
        animation: subir 6s linear forwards;
    }

    @keyframes subir {
        0% { transform: translateY(0); opacity: 0; }
        20% { opacity: 0.5; }
        80% { opacity: 0.5; }
        100% { transform: translateY(-110vh); opacity: 0; }
    }

    /* Containers */
    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
        animation: fadeIn 1.5s ease;
        box-sizing: border-box;
        position: relative;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    /* Inputs e Botões */
    input {
        padding: 14px;
        border-radius: 25px;
        border: 1px solid #ddd;
        width: 100%;
        max-width: 300px;
        font-size: 16px;
        margin-bottom: 10px;
        text-align: center;
    }

    button {
        padding: 14px 28px;
        margin: 10px;
        border-radius: 30px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        width: 200px;
        max-width: 80%;
        font-weight: 500;
        touch-action: manipulation;
    }

    .sim {
        background: linear-gradient(45deg, #ff7eb3, #ff758c);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
    }

    .nao {
        background: #ccc;
        color: #333;
        position: relative;
        transition: all 0.2s ease;
        z-index: 10;
    }

    /* Carta */
    .paper {
        background: rgba(255, 255, 255, 0.95);
        padding: 25px;
        border-radius: 15px;
        max-width: 600px;
        width: 90%;
        max-height: 55vh;
        overflow-y: auto;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
        line-height: 1.8;
        text-align: left;
        margin-bottom: 20px;
        scrollbar-width: thin;
        scrollbar-color: #ff758c #f1f1f1;
    }

    .paper::-webkit-scrollbar { width: 5px; }
    .paper::-webkit-scrollbar-thumb { background: #ff758c; border-radius: 10px; }

    #texto { white-space: pre-line; margin: 0; }
    .hidden { display: none !important; }

    @media (max-width: 600px) {
        h1 { font-size: 22px; }
        h2 { font-size: 18px; }
        button { font-size: 14px; width: 160px; }
    }
</style>
</head>

<body>

<div class="bg"></div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container" id="login1">
    <h2>🔒 Só para alguém especial</h2>
    <p>Quando é que tudo começou? (Data da Primeira Chamada) 😊</p>
    <input type="password" id="senha1" placeholder="Resposta secreta">
    <button class="sim" onclick="verificar1()">Continuar</button>
</div>

<div class="container hidden" id="login2">
    <h2>💖 Quase lá...</h2>
    <p>1 + 1 = ? 🧐</p>
    <input type="password" id="senha2" placeholder="Digite o resultado">
    <button class="sim" onclick="verificar2()">Entrar</button>
</div>

<div class="container hidden" id="pedido">
    <h1>💖 Glédisse...</h1>
    <h2>Aceitas namorar comigo?</h2>
    <div style="width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; min-height: 150px;">
        <button class="sim" onclick="aceitou()">SIM 💕</button>
        <button class="nao" onmouseover="fugir()" onclick="fugir()">NÃO 😅</button>
    </div>
</div>

<div class="container hidden" id="carta">
    <h2>💌 Para ti</h2>
    <div class="paper">
        <p id="texto"></p>
    </div>
    <button id="botaoFinal" class="sim hidden" onclick="iniciarFinal()">💖 Aperte aqui 💖</button>
</div>

<div class="container hidden" id="final">
    <h1>🎉 Agora é oficial 💖</h1>
    <h3 id="contador"></h3>
</div>

<script>
    const MAX_TENTATIVAS = 3;

function obterDataHoje() {
    return new Date().toLocaleDateString();
}

function verificarTentativas() {
    let dataHoje = obterDataHoje();
    let dados = JSON.parse(localStorage.getItem("tentativas")) || {
        data: dataHoje,
        usadas: 0
    };

    if (dados.data !== dataHoje) {
        dados = {
            data: dataHoje,
            usadas: 0
        };
        localStorage.setItem("tentativas", JSON.stringify(dados));
    }

    if (dados.usadas >= MAX_TENTATIVAS) {
        alert("Limite de 3 tentativas atingido hoje. Volte amanhã.");
        return false;
    }

    return true;
}

function registrarErro() {
    let dataHoje = obterDataHoje();
    let dados = JSON.parse(localStorage.getItem("tentativas")) || {
        data: dataHoje,
        usadas: 0
    };

    if (dados.data !== dataHoje) {
        dados = {
            data: dataHoje,
            usadas: 0
        };
    }

    dados.usadas++;
    localStorage.setItem("tentativas", JSON.stringify(dados));

    let restantes = MAX_TENTATIVAS - dados.usadas;

    if (restantes > 0) {
        alert(`Resposta errada 😅 Restam ${restantes} tentativa(s) hoje.`);
    } else {
        alert("Limite de tentativas atingido. Volte amanhã.");
    }
}
function trocarTela(atual, proximo) {
    document.getElementById(atual).classList.add("hidden");
    document.getElementById(proximo).classList.remove("hidden");
}

function verificar1() {
    if (!verificarTentativas()) return;

    let s = document.getElementById("senha1").value.toLowerCase().trim();

    if (s === "6/03/2026") {
        trocarTela("login1", "login2");
    } else {
        registrarErro();
    }
}

function verificar2() {
    if (!verificarTentativas()) return;

    let s = document.getElementById("senha2").value.trim();

    if (s === "5") {
        trocarTela("login2", "pedido");
    } else {
        registrarErro();
    }
}

function fugir() {
    let b = document.querySelector(".nao");
    b.style.position = "fixed";
    let safeMargin = 60;
    let maxX = window.innerWidth - b.clientWidth - safeMargin;
    let maxY = window.innerHeight - b.clientHeight - safeMargin;
    let randomX = Math.max(safeMargin, Math.floor(Math.random() * maxX));
    let randomY = Math.max(safeMargin, Math.floor(Math.random() * maxY));
    b.style.left = randomX + "px";
    b.style.top = randomY + "px";
}

function aceitou() {
    trocarTela("pedido", "carta");
    escrever();
}

let textoCompleto = `Glédisse.

Foi aqui onde escrevi as coisas mais bonitas e as mais feias.

Mesmo fazendo bonito consigo fazer feio.

Esse pequeno gesto não é com a intenção te fazer tomar nenhum tipo de decisão, ao contrário do que achas certo para ti.

Mas sim, um pedidos de desculpas meu, pelas palavras minhas mal expressadas.

Não, era minha intenção fazer entender que eu queria ir embora e que estava a desistir, por mais que tenha sido praticamente o que eu escrevi (li a mensagem mais calmo no dia seguinte).

Estou mesmo aqui para dizer que te amo, independentemente de qualquer coisa. Só quero que tomes as melhores decisões para tua vida, deve ser por isso que me preocupo de forma exagerada (às vezes), quero sim que vivas o presente mas que penses sempre no futuro, estando eu nele ou não. Não quero te proibir de fazer nada e nem de ir a certos lugares (ainda não me encontro na posição para fazer isso e mesmo que me encontre tu sabes bem o que é errado e o que é certo), tu és alguém que está sempre no meio de pessoas, talvez seja isso que me deixa tipo essa não vai encontrar alguém "melhor" e dizer que já não sou suficiente!? Mas errei aí, acredito que o primeiro passo em uma relação é confiança e preciso rever isso.

Estarei aqui para o que precisares e quando precisares, qualquer coisa "liga só no djuneee 😂".

Eu não acho que tu tenhas desistido de mim completamente (talvez esteja errado), mas eu não vou desistir de ti (de nós). Tu és quem eu escolhi, a pessoa que entrou na minha vida do nada, aquela dor de cabeça que eu sequer sabia que precisava, aquele aperto no coração que sinto quando o assunto é Glédisse.

Sou um homem de defeitos, e acho que aquele é um deles (ser impulsivo). Sim, as coisas que são ditas na raiva, na mágoa representam uma parte da verdade do que sentimos e achamos do outro (mas nenhuma das coisas que falei foi que já não tenho sentimentos por ti).

Não prometi que seria perfeito, mas que seria o melhor, mas o melhor sempre dá para melhorar, melhorar, melhorar. Só queria que tentássemos de novo, de novo e de novo. E que a cada falha, erro ou problema, possamos aprender a sentar, conversar e dizer o que nos incomoda (até porque somos todos diferentes e temos experiências diferentes, ninguém sabe melhor como cuidar de ti a não ser tu mesmo), e tu vais moldando a pessoa até que isso passe a ser automático. Que a cada problema e falha, possamos voltar melhores e melhores e melhores. Que não desistamos de nós em busca do perfeito. Sei que existem coisas como saídas etc..., acredito que tu queiras, eu também quero sair mais contigo (quem não pode querer andar pela rua com uma dama cheese como tu!?), vou fazer isso e quero fazer isso, só preciso de um pouco de tempo para me restabelecer, até porque não trabalho e tenho de pagar a conta para 2 e estou para lançar um projecto. Mas vou fazer isso.

Há dias me perguntaste "Estás a mudar porquê?" Não estou a mudar, só estou a me permitir estar à vontade contigo. E em frente das pessoas, algo que eu não me sentia à vontade em fazer.

Um dos meus erros também foi ter escutado a opinião de outros, em assuntos que só nós conhecemos. O que só colocou minha cabeça mais agitada e a pensar coisas e cenários que não existem. Não culpo a ninguém por isso, é de minha total responsabilidade as coisas que falo e faço.

Vamos tentar de novo!? Não precisas responder agora, leve teu tempo, vou te dar teu espaço como pediste.

Alguns escrevem cartas à mão, eu faço diferente 😂.

Não existem pessoas iguais no mundo: "A nossa diferença é que nos faz iguais" (por sermos diferentes é que somos iguais), acho que agora entendeste o que eu quis dizer.

Era suposto receberes rosas, mas deu tudo errado 😂, te devo essa ❤️.

Depois que acabares de ler, se é que vais ler até aqui, me manda um dos stickers que roubaste de mim, para eu devolver a carta principal.

Para: Minha Pequena Grande Menina.

De: Djuneee
By: C J`;

let index = 0;
function escrever() {
    let elemento = document.getElementById("texto");
    let container = document.querySelector(".paper");
    if (index < textoCompleto.length) {
        elemento.innerHTML += textoCompleto.charAt(index);
        index++;
        container.scrollTop = container.scrollHeight;
        setTimeout(escrever, 50);
    } else {
        document.getElementById("botaoFinal").classList.remove("hidden");
    }
}

function iniciarFinal() {
    document.getElementById("musica").play();
    trocarTela("carta", "final");
    let dataInicio = localStorage.getItem("inicioRelacionamento") || new Date().toISOString();
    localStorage.setItem("inicioRelacionamento", dataInicio);
    setInterval(() => {
        let diff = new Date() - new Date(dataInicio);
        let s = Math.floor(diff/1000)%60;
        let m = Math.floor(diff/60000)%60;
        let h = Math.floor(diff/3600000)%24;
        let d = Math.floor(diff/86400000);
        document.getElementById("contador").innerHTML = `${d} dias ${h}h ${m}m ${s}s juntos 💕`;
    }, 1000);
}

setInterval(() => {
    let kitty = document.createElement("div");
    kitty.className = "kitty";
    kitty.innerHTML = "🎀🐱";
    kitty.style.left = Math.random() * 90 + "vw";
    kitty.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(kitty);
    setTimeout(() => kitty.remove(), 6000);
}, 800);
</script>

</body>
</html>
