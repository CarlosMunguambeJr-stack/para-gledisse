<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #fdfbfb, #ebedee);
        color: #333;
        overflow-x: hidden;
        width: 100vw;
        height: 100vh;
    }

    /* Fundo Principal */
    .bg {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('foto.jpg') center/cover no-repeat;
        filter: blur(6px) brightness(0.7);
        z-index: -2;
    }

    /* Hello Kitty flutuando ao fundo */
    .kitty {
        position: fixed;
        bottom: -50px;
        z-index: -1;
        pointer-events: none;
        opacity: 0.5;
        animation: subir 6s linear forwards;
    }

    @keyframes subir {
        0% { transform: translateY(0); opacity: 0; }
        20% { opacity: 0.5; }
        80% { opacity: 0.5; }
        100% { transform: translateY(-110vh); opacity: 0; }
    }

    /* Containers */
    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
        animation: fadeIn 1.5s ease;
        box-sizing: border-box;
        position: relative;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    /* Inputs e Botões */
    input {
        padding: 14px;
        border-radius: 25px;
        border: 1px solid #ddd;
        width: 100%;
        max-width: 300px;
        font-size: 16px;
        margin-bottom: 10px;
        text-align: center;
    }

    button {
        padding: 14px 28px;
        margin: 10px;
        border-radius: 30px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        width: 200px;
        max-width: 80%;
        font-weight: 500;
        touch-action: manipulation;
    }

    .sim {
        background: linear-gradient(45deg, #ff7eb3, #ff758c);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
    }

    .nao {
        background: #ccc;
        color: #333;
        position: relative;
        transition: all 0.2s ease;
        z-index: 10;
    }

    /* Carta */
    .paper {
        background: rgba(255, 255, 255, 0.95);
        padding: 25px;
        border-radius: 15px;
        max-width: 600px;
        width: 90%;
        max-height: 55vh;
        overflow-y: auto;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
        line-height: 1.8;
        text-align: left;
        margin-bottom: 20px;
        scrollbar-width: thin;
        scrollbar-color: #ff758c #f1f1f1;
    }

    .paper::-webkit-scrollbar { width: 5px; }
    .paper::-webkit-scrollbar-thumb { background: #ff758c; border-radius: 10px; }

    #texto { white-space: pre-line; margin: 0; }
    .hidden { display: none !important; }

    @media (max-width: 600px) {
        h1 { font-size: 22px; }
        h2 { font-size: 18px; }
        button { font-size: 14px; width: 160px; }
    }
</style>
</head>

<body>

<div class="bg"></div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container" id="login1">
    <h2>🔒 Só para alguém especial</h2>
    <p>Quando é que tudo começou? (Data da Primeira Chamada) 😊</p>
    <input type="password" id="senha1" placeholder="Resposta secreta">
    <button class="sim" onclick="verificar1()">Continuar</button>
</div>

<div class="container hidden" id="login2">
    <h2>💖 Quase lá...</h2>
    <p>1 + 1 = ? 🧐</p>
    <input type="password" id="senha2" placeholder="Digite o resultado">
    <button class="sim" onclick="verificar2()">Entrar</button>
</div>

<div class="container hidden" id="pedido">
    <h1>💖 Glédisse...</h1>
    <h2>Aceitas namorar comigo?</h2>
    <div style="width: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; min-height: 150px;">
        <button class="sim" onclick="aceitou()">SIM 💕</button>
        <button class="nao" onmouseover="fugir()" onclick="fugir()">NÃO 😅</button>
    </div>
</div>

<div class="container hidden" id="carta">
    <h2>💌 Para ti</h2>
    <div class="paper">
        <p id="texto"></p>
    </div>
    <button id="botaoFinal" class="sim hidden" onclick="iniciarFinal()">💖 Aperte aqui 💖</button>
</div>

<div class="container hidden" id="final">
    <h1>🎉 Agora é oficial 💖</h1>
    <h3 id="contador"></h3>
</div>

<script>
    const MAX_TENTATIVAS = 3;

function obterDataHoje() {
    return new Date().toLocaleDateString();
}

function verificarTentativas() {
    let dataHoje = obterDataHoje();
    let dados = JSON.parse(localStorage.getItem("tentativas")) || {
        data: dataHoje,
        usadas: 0
    };

    if (dados.data !== dataHoje) {
        dados = {
            data: dataHoje,
            usadas: 0
        };
        localStorage.setItem("tentativas", JSON.stringify(dados));
    }

    if (dados.usadas >= MAX_TENTATIVAS) {
        alert("Limite de 3 tentativas atingido hoje. Volte amanhã.");
        return false;
    }

    return true;
}

function registrarErro() {
    let dataHoje = obterDataHoje();
    let dados = JSON.parse(localStorage.getItem("tentativas")) || {
        data: dataHoje,
        usadas: 0
    };

    if (dados.data !== dataHoje) {
        dados = {
            data: dataHoje,
            usadas: 0
        };
    }

    dados.usadas++;
    localStorage.setItem("tentativas", JSON.stringify(dados));

    let restantes = MAX_TENTATIVAS - dados.usadas;

    if (restantes > 0) {
        alert(`Resposta errada 😅 Restam ${restantes} tentativa(s) hoje.`);
    } else {
        alert("Limite de tentativas atingido. Volte amanhã.");
    }
}
function trocarTela(atual, proximo) {
    document.getElementById(atual).classList.add("hidden");
    document.getElementById(proximo).classList.remove("hidden");
}

function verificar1() {
    if (!verificarTentativas()) return;

    let s = document.getElementById("senha1").value.toLowerCase().trim();

    if (s === "6/03/2026") {
        trocarTela("login1", "login2");
    } else {
        registrarErro();
    }
}

function verificar2() {
    if (!verificarTentativas()) return;

    let s = document.getElementById("senha2").value.trim();

    if (s === "5") {
        trocarTela("login2", "pedido");
    } else {
        registrarErro();
    }
}

function fugir() {
    let b = document.querySelector(".nao");
    b.style.position = "fixed";
    let safeMargin = 60;
    let maxX = window.innerWidth - b.clientWidth - safeMargin;
    let maxY = window.innerHeight - b.clientHeight - safeMargin;
    let randomX = Math.max(safeMargin, Math.floor(Math.random() * maxX));
    let randomY = Math.max(safeMargin, Math.floor(Math.random() * maxY));
    b.style.left = randomX + "px";
    b.style.top = randomY + "px";
}

function aceitou() {
    trocarTela("pedido", "carta");
    escrever();
}

let textoCompleto = `Glédisse, 'Doll'.

Primeiro quero pedir desculpa pelo oque fiz hoje, nada vai e nem pode justificar oque fiz. Mas talvez foi isso que me fez perceber que estou quase a colapsar se as coisas continuarem assim ( eu a tentar perceber as coisas que não dizes).

Hoje agiste com indiferença a minha presença e gritaste "eu não quero" que até pessoas que nunca tiveram coragem de falar comigo me mandaram mensagem a falar sobre. Mas não é por isso que escrevo isto.

Jénia me contou sobre oque falaste com ela na sexta-feira (isso na segunda-feira) porque eu insisti. Disseste várias coisas, uma delas é que não querias me falar por medo de eu cometer suicídio ou algo parecido (não fiz isso antes não vou fazer agora), e porque eu já tinha me aberto contigo (sobre aquela da MarkX e meu pai acredito eu). Só estou aqui para ti dizer que não sou nenhum coitado e não preciso que sintam pena de mim, a vida é assim e muito pior.

Se queres seguir por caminhos diferentes é só dizer, que vou respeitar tua decisão. Mas não faça isso que tens feito, tenho de correr a trás de ti, mandar mensagens e ser respondido quando possível (porque Doll é a assim e tem problemas) isso porque estas a ser paquerada, sim estas a ser paquerada mas já somos íntimos em outro nível (sou da opinião que corpo de mulher não e qualquer um que tem acesso ou ve nu), todos temos problemas, EU sou Órfão Doll Órfão, vivo sem ter onde chorar ou me proteger. Mas nunca usei isso para justificar nada do que um dia fiz ou faco. Tu tens país separados, posso imaginar um pouco como deve ser isso, acredito que seja por isso que estás fora de casa, para evitar a solidão.

Insisti em ficar porque vocês conhecem DOLL e eu estou em busca da Gledisse, falamos com pessoas diferentes (e oque digo aos meus amigos). Eu só quero conhecer a Glédisse filha de pais separados, que chega a casa deve ser mana, mas queria ser mimada.

Porque a mãe quase sempre está longe e o pai só faz o seu dever e não seu papel.

Coloquei de lado muitos dos meus princípios e medos para tentar ajustar as coisas. Não sei porquê não falas comigo as coisas a 100% sendo que sempre te dei abertura para tal, se tivesses dito que já não dava quando as coisas começaram a dar errado seria muito melhor ou se tivesses recusado o pedido teria sido o melhor.

Te ver fazer coisas para que seja eu a desistir de ti dói, mais do que qualquer outra coisa. Vou me me afastar (não porque quero) mas porque assim devo fazer, prefiro te ter na mente como alguém muito importante na minha vida do que como alguém que me faltou com o respeito.

Nunca imaginei que oque fosse fazer meu relacionamento dar certo séria eu não poder gastar dinheiro. Várias vezes te chamei para caminharmos, eu já tinha todo um roteiro na cabeça dos dates que faríamos (não íamos somente caminhar).

Eu acho que estas mais preocupada em agradar e impressionar teus amigos, mas acredito que isso seja apenas uma fase, tem coisas que vais ter de entender na pratica. Ainda vais perder alguns amigos, que hoje nem imaginas e a vida segue.

Ainda vais perceber que Doll só é Doll (so e respeitada) porque mãe e pai ainda existem. Tem muito coisa que eu falo que só vai fazer sentido no dia que vivenciares ( espero que não aconteça tão já). Com tua idade tive que virar homem de verdade da noite para o dia e assumir responsabilidades por isso não faco algumas das coisas que fazes. Sei que ainda queres curtir porque és jovem faça isso e seja feliz mas não esqueça do amanhã a vida muda em um instante. Que sejas a Engenheira independente que tanto queres e que não te percas a tentar manter o lifestyle (mirrela e um exemplo disso).

Estarei aqui para oque precisares e quando precisares. O número é o mesmo e quando não for saberás.

Já fazes parte da melhor temporada da minha vida.

Não sou de fazer textos ou falar muito. Mas para meu desencargo de consciência preciso fazer isso. Não desisti de ti, mas me afastei para tentar preservar o sentimento que nunca vou esquecer, Obrigado por tudo e seja feliz, espero que encontres o homem da tua vida e que ele possa cuidar de ti melhor e fazer aquilo que não consegui.

Para minha pequena grande menina...até já...

😛( língua para fora com cara de Doll 😂)

De: Djuneee :) `;

let index = 0;
function escrever() {
    let elemento = document.getElementById("texto");
    let container = document.querySelector(".paper");
    if (index < textoCompleto.length) {
        elemento.innerHTML += textoCompleto.charAt(index);
        index++;
        container.scrollTop = container.scrollHeight;
        setTimeout(escrever, 50);
    } else {
        document.getElementById("botaoFinal").classList.remove("hidden");
    }
}

function iniciarFinal() {
    document.getElementById("musica").play();
    trocarTela("carta", "final");
    let dataInicio = localStorage.getItem("inicioRelacionamento") || new Date().toISOString();
    localStorage.setItem("inicioRelacionamento", dataInicio);
    setInterval(() => {
        let diff = new Date() - new Date(dataInicio);
        let s = Math.floor(diff/1000)%60;
        let m = Math.floor(diff/60000)%60;
        let h = Math.floor(diff/3600000)%24;
        let d = Math.floor(diff/86400000);
        document.getElementById("contador").innerHTML = `${d} dias ${h}h ${m}m ${s}s juntos 💕`;
    }, 1000);
}

setInterval(() => {
    let kitty = document.createElement("div");
    kitty.className = "kitty";
    kitty.innerHTML = "🎀🐱";
    kitty.style.left = Math.random() * 90 + "vw";
    kitty.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(kitty);
    setTimeout(() => kitty.remove(), 6000);
}, 800);
</script>

</body>
</html>
